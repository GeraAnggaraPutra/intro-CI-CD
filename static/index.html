<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go App Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      max-width: 520px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      color: #111827;
    }

    p {
      color: #6b7280;
      margin-bottom: 30px;
    }

    .pipeline {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .step {
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
    }

    .arrow {
      color: #9ca3af;
      font-size: 22px;
      font-weight: bold;
    }

    .status {
      margin-top: 30px;
      padding: 12px;
      background: #dcfce7;
      color: #166534;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Go App is Running</h1>
    <p>This page is served by a Golang web server.</p>

    <div class="pipeline">
      <div class="step">Code</div>
      <div class="arrow">→</div>
      <div class="step">Test</div>
      <div class="arrow">→</div>
      <div class="step">Build</div>
      <div class="arrow">→</div>
      <div class="step">Deploy</div>
    </div>

    <div class="status">
      Server Status: Online
    </div>
  </div>
</body>
</html>
